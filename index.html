<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Chat App</title>
  <style>
    body { font-family: Arial; margin:0; }
    .hidden { display:none; }
    .login, .app { height:100vh; display:flex; justify-content:center; align-items:center; }
    .box { border:1px solid #ccc; padding:20px; border-radius:10px; }
    .sidebar { width:200px; background:#f5f5f5; height:100vh; padding:10px; }
    .main { flex:1; padding:10px; }
    .container { display:flex; width:100%; }
    .chat-box { border:1px solid #ccc; height:300px; overflow:auto; margin-bottom:10px; padding:5px; }
    .menu { cursor:pointer; margin:10px 0; }
    .error { color:red; font-size:14px; }
  </style>
</head>
<body>

<div class="login" id="loginPage">
  <div class="box">
    <h3>Login</h3>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <div id="errorMsg" class="error"></div><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="app hidden" id="appPage">
  <div class="container">
    <div class="sidebar">
      <div class="menu" onclick="showPage('home')">Home</div>
      <div class="menu" onclick="showPage('search')">Search</div>
      <div class="menu" onclick="showPage('message')">Message</div>
      <div class="menu" onclick="showPage('profile')">Akun</div>
      <div class="menu" onclick="showPage('settings')">Setting</div>
      <div class="menu" onclick="logout()">Logout</div>
    </div>

    <div class="main">
      <div id="home">Welcome ke Home</div>
      <div id="search" class="hidden">Halaman Search</div>

      <div id="message" class="hidden">
        <div class="chat-box" id="chatBox"></div>
        <input id="chatInput" placeholder="Ketik pesan...">
        <button onclick="sendMessage()">Kirim</button>
      </div>

      <div id="profile" class="hidden">
        <h3>Profil</h3>
        <p>Username: <span id="profileName"></span></p>
        <p>Bio: User sederhana</p>
      </div>

      <div id="settings" class="hidden">Pengaturan</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
